<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSD | Official Institutional Asset</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #010409; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --gold: #FFD700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding-bottom: 100px; background-image: radial-gradient(circle at top, #002213 0%, #010409 60%); min-height: 100vh; overflow-x: hidden; }
        nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(1,4,9,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; border-bottom: 1px solid var(--border); z-index: 1000; }
        .page-section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn-action { background: var(--primary); color: #000; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .spec-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .spec-table td { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .val { text-align: right; font-weight: 700; color: var(--primary); }
        .footer-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: #010409; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; }
        .tab-btn { background: none; border: none; color: #fff; font-size: 0.7rem; opacity: 0.4; flex: 1; outline: none; }
        .tab-btn.active { opacity: 1; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>
    <nav><div style="font-weight:800; color:var(--primary);">BUSD PROTOCOL</div><div style="font-size:0.6rem; opacity:0.5; font-weight:700;">BY BUSD TEAM</div></nav>
    
    <main id="home" class="page-section active">
        <h1 style="font-size:2.2rem; font-weight:800; margin-bottom:15px; line-height:1.1;">Institutional <br>Asset Gateway</h1>
        <div class="card">
            <h4 style="color:var(--primary); font-size:0.8rem; text-transform:uppercase;">Protocol Specs</h4>
            <table class="spec-table">
                <tr><td style="opacity:0.5;">Supply</td><td class="val">1,000,000,000 BUSD</td></tr>
                <tr><td style="opacity:0.5;">Network</td><td class="val">Arbitrum One</td></tr>
                <tr><td style="opacity:0.5;">Rate</td><td class="val">₹0.90 / BUSD</td></tr>
            </table>
        </div>
        <button class="btn-action" onclick="go('buy')">PROCEED TO BUY (P2P)</button>
    </main>

    <main id="buy" class="page-section">
        <div id="s1" class="card">
            <h3>1. Buy Request</h3>
            <label style="font-size:0.7rem; opacity:0.5;">Arbitrum Wallet Address</label>
            <input type="text" id="w" placeholder="0x...">
            <label style="font-size:0.7rem; opacity:0.5;">Amount INR (Min ₹1000)</label>
            <input type="number" id="a" placeholder="Enter Amount" oninput="c()">
            <p style="color:var(--primary); font-weight:800; margin:10px 0;">Receive: <span id="r">0</span> BUSD</p>
            <button class="btn-action" onclick="pay()">NEXT: PAY VIA UPI</button>
        </div>
        <div id="s2" class="card" style="display:none; text-align:center;">
            <h3>2. Scan & Pay</h3>
            <div style="background:#fff; padding:15px; border-radius:15px; width:180px; margin:20px auto;">
                <img id="qr" src="" style="width:100%;" alt="Payment QR">
            </div>
            <p style="color:var(--gold); font-weight:800;">UPI: Bharatbusd@postbank</p>
            <input type="text" id="utr" placeholder="12-Digit UTR Number">
            <button class="btn-action" style="background:var(--gold);" onclick="done()">SUBMIT FOR VERIFICATION</button>
        </div>
    </main>

    <nav class="footer-tabs">
        <button id="th" class="tab-btn active" onclick="go('home')">🏠<br>Info</button>
        <button id="tb" class="tab-btn" onclick="go('buy')">🔄<br>Buy</button>
    </nav>

    <script>
        function go(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            if(id=='home') document.getElementById('th').classList.add('active');
            if(id=='buy') document.getElementById('tb').classList.add('active');
            window.scrollTo(0,0);
        }
        function c() { let v = document.getElementById('a').value; document.getElementById('r').innerText = v ? Math.floor(v/0.9).toLocaleString() : '0'; }
        function pay() {
            let amt = document.getElementById('a').value; if(amt < 1000) { alert('Minimum investment ₹1,000'); return; }
            let url = "upi://pay?pa=Bharatbusd@postbank&pn=BUSD_TEAM&am=" + amt + "&cu=INR";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(url);
            document.getElementById('s1').style.display = 'none'; document.getElementById('s2').style.display = 'block';
        }
        function done() { alert('✅ SUCCESS! BUSD Team is verifying.'); location.reload(); }
    </script>
</body>
</html>
